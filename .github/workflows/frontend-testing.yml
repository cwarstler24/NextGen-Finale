name: Frontend Tests

on:
  pull_request:
    paths:
      - 'testing/frontend/**'
      - 'main/frontend/**'
      - '.github/workflows/frontend-testing.yml'
  push:
    branches:

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.2.1'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: |
          echo "::group::Vitest Results"
          npm run test --reporter=verbose
          echo "::endgroup::"